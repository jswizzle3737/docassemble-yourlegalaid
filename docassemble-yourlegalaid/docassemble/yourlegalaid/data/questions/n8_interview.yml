---
include:
  - shared_fields.yml
---
metadata:
  title: N8 – Notice to End Tenancy at the End of Term
  short title: N8 Notice
  revision_date: 2026-03-29
---
mandatory: True
code: |
  form_type = 'N8'
  form_fee = 49
---
mandatory: True
question: |
  ## N8 – Notice to End Tenancy at the End of Term

  Use this notice for persistent late rent or repeated N5 behaviour.
  This is a **non-voidable** notice — minimum **60 days** notice required.

  **Time:** ~5 minutes | **Fee:** $49
subquestion: |
  ${ disclaimer_template }
field: intro_screen_seen
buttons:
  - Begin Interview: continue
---
question: |
  Landlord Information
fields:
  - First Name: landlord.name.first
  - Last Name: landlord.name.last
  - Street Address: landlord.address
  - City: landlord.city
    default: Toronto
  - Postal Code: landlord.postal_code
---
question: |
  Reason for the N8 Notice
fields:
  - Reason: n8_reason
    choices:
      - Persistently paid rent late
      - Repeated N5 behaviour within 6 months of a previous N5
      - Repeated safety impairment (repeat offence)
      - Gave false income information (rent-geared-to-income unit)
---
question: |
  Details of Late Payments or Repeated Behaviour
subquestion: |
  % if n8_reason == 'Persistently paid rent late':
  List each instance of late rent payment.
  % else:
  Describe the repeated behaviour and reference the prior N5 notice.
  % endif
fields:
  - Description: n8_details
    datatype: area
    rows: 8
  - Previous N5 served on (if applicable): previous_n5_date
    datatype: date
    required: False
---
question: |
  Termination Date
subquestion: |
  Must be at the **end of a rental period** and at least **60 days** after service.
fields:
  - Termination Date: termination_date
    datatype: date
---
question: |
  Certificate of Service
fields:
  - Method of Service: service_method
    choices:
      - Handed to the tenant in person
      - Left in the tenant's mailbox
      - Slid under the door of the rental unit
      - Sent by mail
      - Sent by courier
---
mandatory: True
question: |
  ## Review Your N8 Notice

  **Landlord:** ${ landlord.name }
  **Tenant:** ${ tenant.name }
  **Rental Unit:** ${ rental_unit.address }, ${ rental_unit.city }
  **Reason:** ${ n8_reason }
  **Termination Date:** ${ termination_date }
field: review_complete
buttons:
  - Generate N8: continue
  - Start Over: restart
---
attachment:
  name: N8 Notice – ${ tenant.name }
  filename: N8_${ tenant.name.last }_${ tenant.name.first }
  pdf template file: N8.pdf
  editable: False
  variable name: n8_attachment
  fields:
    - "TO_TenameName[0]": ${ tenant.name }
    - "RentalUnitAddress[0]": ${ rental_unit.address }${ ', Unit ' + rental_unit.unit if rental_unit.unit else '' }, ${ rental_unit.city }, ${ rental_unit.province } ${ rental_unit.postal_code }
    - "From_LandlordName[0]": ${ landlord.name }
    - "RFirstName[0]": ${ landlord.name.first }
    - "RLastName[0]": ${ landlord.name.last }
    - "RDayPhone[0]": ''
    - "Reason1[0]": ${ n8_reason == 'Persistently paid rent late' }
    - "Reason2[0]": ${ n8_reason == 'Repeated N5 behaviour within 6 months of a previous N5' }
    - "Reason3[0]": ${ n8_reason == 'Repeated safety impairment (repeat offence)' }
    - "Reason4[0]": ${ n8_reason == 'Gave false income information (rent-geared-to-income unit)' }
    - "NoticeDetail[0]": ${ n8_details[:1000] }
    - "TerminationDate[0]": ${ termination_date }
    - "SignDate[0]": ${ today() }
    - "Signature[0]": ${ landlord.name }
---
mandatory: True
question: |
  ## Your N8 Notice is Ready
subquestion: |
  **Next Steps:**

  1. Download and serve the N8 on your tenant
  2. After the termination date, file an [L2 Application](https://yourlegalaid.ca/forms-l2/)
  3. Keep records of all late payments or prior N5 notices

  ${ n8_attachment }

  ${ disclaimer_template }
buttons:
  - Start Another Form: restart
