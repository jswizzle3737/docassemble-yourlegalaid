include:
  - shared_fields.yml
---
metadata:
  title: N7 – Notice to End Tenancy for Causing Serious Problems
  short title: N7 Notice
  revision_date: 2026-03-29
---
mandatory: True
code: |
  form_type = 'N7'
  form_fee = 49
---
mandatory: True
question: |
  ## N7 – Notice to End Tenancy
  ### Causing Serious Problems

  This is a **non-voidable** notice. The tenant cannot fix the problem
  to avoid eviction. Termination is **10 days** after service.

  **Time:** ~5 minutes | **Fee:** $49
subquestion: |
  ${ disclaimer_template }
field: intro_screen_seen
buttons:
  - Begin Interview: continue
---
question: |
  Landlord Information
fields:
  - First Name: landlord.name.first
  - Last Name: landlord.name.last
  - Street Address: landlord.address
  - City: landlord.city
    default: Toronto
  - Postal Code: landlord.postal_code
---
question: |
  Reason for the N7 Notice
fields:
  - Reason: n7_reason
    choices:
      - Caused serious damage to the rental unit or building
      - Used the rental unit for an illegal purpose
      - Seriously impaired the safety of another person
      - Permitted an illegal act in the rental unit
---
question: |
  Describe what happened
fields:
  - Description: incident_description
    datatype: area
    rows: 8
  - Date of incident: incident_date
    datatype: date
  - Police report filed?: has_police_report
    datatype: yesnoradio
  - Police report number: police_report_number
    show if: has_police_report
---
question: |
  Termination Date
subquestion: |
  Must be at least **10 days** after service for most reasons.
fields:
  - Termination Date: termination_date
    datatype: date
---
question: |
  Certificate of Service
fields:
  - Method of Service: service_method
    choices:
      - Handed to the tenant in person
      - Left in the tenant's mailbox
      - Slid under the door of the rental unit
      - Sent by mail
      - Sent by courier
---
mandatory: True
question: |
  ## Review Your N7 Notice

  **Landlord:** ${ landlord.name }
  **Tenant:** ${ tenant.name }
  **Rental Unit:** ${ rental_unit.address }, ${ rental_unit.city }
  **Reason:** ${ n7_reason }
  **Incident Date:** ${ incident_date }
  **Termination Date:** ${ termination_date }
field: review_complete
buttons:
  - Generate N7: continue
  - Start Over: restart
---
mandatory: True
question: |
  ## Your N7 Notice is Ready
subquestion: |
  **Next Steps:**

  1. Download and serve the N7 on your tenant
  2. You may file an [L2 Application](https://yourlegalaid.ca/forms-l2/)
     after the termination date
  3. Keep all evidence and the police report (if any) for the hearing

  ${ disclaimer_template }
buttons:
  - Download PDF: exit
    url: https://yourlegalaid.ca/thank-you/
  - Start Another Form: restart
