---
include:
  - shared_fields.yml
---
metadata:
  title: T6 – Tenant Application about Maintenance
  short title: T6 Application
  revision_date: 2026-03-29
---
mandatory: True
code: |
  form_type = 'T6'
  form_fee = 53
---
mandatory: True
question: |
  ## T6 – Maintenance Application

  Use this form when your landlord has failed to maintain your rental
  unit or building, including health, safety, or housing standards violations.

  **Time:** ~10 minutes | **Fee:** $53
subquestion: |
  ${ disclaimer_template }
field: intro_screen_seen
buttons:
  - Begin Interview: continue
---
question: |
  Your Information (Tenant)
fields:
  - First Name: tenant.name.first
  - Last Name: tenant.name.last
  - Phone Number: tenant.phone
    required: False
  - Email: tenant.email
    datatype: email
    required: False
---
question: |
  Landlord Information
fields:
  - First Name: landlord.name.first
  - Last Name: landlord.name.last
  - Street Address: landlord.address
  - City: landlord.city
    default: Toronto
  - Postal Code: landlord.postal_code
---
question: |
  What maintenance issues exist?
fields:
  - Issues: t6_issues
    datatype: checkboxes
    choices:
      - Failure to maintain the rental unit in a good state of repair
      - Failure to maintain the residential complex
      - Breach of health, safety, housing, or maintenance standards
      - Failure to comply with a work order from the municipality
    none of the above: False
---
question: |
  Describe the maintenance problems
fields:
  - Description: maintenance_description
    datatype: area
    rows: 8
  - When did the problem start?: problem_start_date
    datatype: date
  - Have you reported this to the landlord?: reported_to_landlord
    datatype: yesnoradio
  - Date reported: report_date
    datatype: date
    show if: reported_to_landlord
  - How did you report it?: report_method
    show if: reported_to_landlord
    choices:
      - In writing (email, text, or letter)
      - Verbally (in person or by phone)
      - Both written and verbal
---
question: |
  Has the municipality been involved?
fields:
  - Municipal inspection?: has_inspection
    datatype: yesnoradio
  - Work order issued?: has_work_order
    datatype: yesnoradio
    show if: has_inspection
  - Work order details: work_order_details
    datatype: area
    rows: 3
    show if: has_work_order
---
question: |
  What remedies are you requesting?
fields:
  - Remedies: t6_remedies
    datatype: checkboxes
    choices:
      - An order requiring the landlord to do the repairs
      - A rent abatement for the period the problem existed
      - An order for the landlord to pay damages
      - An administrative fine against the landlord
      - Authorization to hire a contractor and deduct cost from rent
    none of the above: False
---
mandatory: True
question: |
  ## Review Your T6 Application

  **Tenant:** ${ tenant.name }
  **Landlord:** ${ landlord.name }
  **Rental Unit:** ${ rental_unit.address }, ${ rental_unit.city }
  **Problem Since:** ${ problem_start_date }

  **Issues:**
  % for issue in t6_issues.true_values():
  - ${ issue }
  % endfor
field: review_complete
buttons:
  - Generate T6: continue
  - Start Over: restart
---
attachment:
  name: T6 Application – ${ tenant.name }
  filename: T6_${ tenant.name.last }_${ tenant.name.first }
  pdf template file: T6.pdf
  editable: False
  variable name: t6_attachment
  fields:
    - "TFirstName1[0]": ${ tenant.name.first }
    - "TLastName1[0]": ${ tenant.name.last }
    - "TAddress[0]": ${ rental_unit.address }${ ', Unit ' + rental_unit.unit if rental_unit.unit else '' }
    - "TMunicipality[0]": ${ rental_unit.city }
    - "TProvince[0]": ${ rental_unit.province }
    - "TPostalCode[0]": ${ rental_unit.postal_code }
    - "TDayPhone[0]": ${ tenant.phone if defined('tenant.phone') else '' }
    - "Temail[0]": ${ tenant.email if defined('tenant.email') else '' }
    - "LFirstName[0]": ${ landlord.name.first }
    - "LLastName[0]": ${ landlord.name.last }
    - "LAddress[0]": ${ landlord.address }
    - "LMunicipality[0]": ${ landlord.city }
    - "LProvince[0]": Ontario
    - "LPostalCode[0]": ${ landlord.postal_code }
    - "StreetNumber[0]": ${ rental_unit.address.split(' ')[0] if ' ' in rental_unit.address else '' }
    - "StreetName[0]": ${ ' '.join(rental_unit.address.split(' ')[1:]) if ' ' in rental_unit.address else rental_unit.address }
    - "Unit[0]": ${ rental_unit.unit if defined('rental_unit.unit') and rental_unit.unit else '' }
    - "Municipality[0]": ${ rental_unit.city }
    - "PostalCode[0]": ${ rental_unit.postal_code }
    - "MoveInDate[0]": ${ tenancy_start_date }
    - "FirstComplainDate[0]": ${ report_date if defined('report_date') and reported_to_landlord else '' }
    - "Part2ReasonDetail[0]": ${ maintenance_description[:500] }
    - "Remedy1[0]": ${ 'An order requiring the landlord to do the repairs' in t6_remedies.true_values() }
    - "Remedy2[0]": ${ 'A rent abatement for the period the problem existed' in t6_remedies.true_values() }
    - "Remedy3[0]": ${ 'An order for the landlord to pay damages' in t6_remedies.true_values() }
    - "Remedy5[0]": ${ 'An administrative fine against the landlord' in t6_remedies.true_values() }
    - "Remedy7[0]": ${ 'Authorization to hire a contractor and deduct cost from rent' in t6_remedies.true_values() }
    - "SignatureDate[0]": ${ today() }
    - "landlord_signature[0]": ${ tenant.name }
---
mandatory: True
question: |
  ## Your T6 Application is Ready
subquestion: |
  **Next Steps:**

  1. Download your completed T6 form below
  2. File with the LTB ($53 filing fee)
  3. Serve a copy on your landlord
  4. Bring photos, work orders, and correspondence to the hearing

  ${ t6_attachment }

  ${ disclaimer_template }
buttons:
  - Start Another Form: restart
