---
include:
  - shared_fields.yml
---
metadata:
  title: L1 – Application to Evict for Non-Payment of Rent
  short title: L1 Application
  revision_date: 2026-03-29
---
mandatory: True
code: |
  form_type = 'L1'
  form_fee = 201
---
mandatory: True
question: |
  ## L1 – Application to Evict a Tenant
  ### Non-Payment of Rent & Collect Rent Arrears

  You must have already served an **N4 Notice** before filing this application.
  The termination date on the N4 must have passed.

  **Time:** ~15 minutes | **Fee:** $201
subquestion: |
  ${ disclaimer_template }
field: intro_screen_seen
buttons:
  - Begin Interview: continue
---
question: |
  Landlord Information
fields:
  - First Name: landlord.name.first
  - Last Name: landlord.name.last
  - Phone Number: landlord.phone
    required: False
  - Email: landlord.email
    datatype: email
    required: False
  - Street Address: landlord.address
  - City: landlord.city
    default: Toronto
  - Postal Code: landlord.postal_code
---
question: |
  Tenant Information
fields:
  - First Name: tenant.name.first
  - Last Name: tenant.name.last
  - Are there additional tenants on the lease?: has_additional_tenants
    datatype: yesnoradio
  - Names of additional tenants: additional_tenants
    datatype: area
    show if: has_additional_tenants
    rows: 3
---
question: |
  N4 Notice Details
fields:
  - Date the N4 was served: n4_service_date
    datatype: date
  - Termination date on the N4: n4_termination_date
    datatype: date
  - How was the N4 served?: n4_service_method
    choices:
      - Handed to the tenant in person
      - Left in the tenant's mailbox
      - Slid under the door
      - Sent by mail
      - Sent by courier
---
question: |
  Rent Arrears
fields:
  - Total rent arrears as of today: total_arrears
    datatype: currency
  - Per-day rent amount: daily_rent
    datatype: currency
    help: |
      Calculate: monthly rent / number of days in the month.
  - Has the tenant made any partial payments since the N4?: partial_payments
    datatype: yesnoradio
  - Amount of partial payments: partial_payment_amount
    datatype: currency
    show if: partial_payments
---
question: |
  What are you requesting?
fields:
  - Requests: l1_requests
    datatype: checkboxes
    choices:
      - An order to evict the tenant
      - An order for the tenant to pay rent arrears
      - An order for the tenant to pay the LTB filing fee ($201)
      - An order for the daily rate of compensation until the tenant moves out
    none of the above: False
---
mandatory: True
question: |
  ## Review Your L1 Application

  **Landlord:** ${ landlord.name }
  **Tenant:** ${ tenant.name }
  **Rental Unit:** ${ rental_unit.address }, ${ rental_unit.city }

  **Monthly Rent:** $${ "%.2f" % monthly_rent }
  **Total Arrears:** $${ "%.2f" % total_arrears }
  **N4 Served:** ${ n4_service_date }
  **N4 Termination Date:** ${ n4_termination_date }
field: review_complete
buttons:
  - Generate L1: continue
  - Start Over: restart
---
code: |
  net_arrears = total_arrears - (partial_payment_amount if partial_payments else 0)
---
attachment:
  name: L1 Application – ${ tenant.name }
  filename: L1_${ tenant.name.last }_${ tenant.name.first }
  pdf template file: L1.pdf
  editable: False
  variable name: l1_attachment
  fields:
    - "LFirstName[0]": ${ landlord.name.first }
    - "LLastName[0]": ${ landlord.name.last }
    - "LAddress[0]": ${ landlord.address }
    - "LMunicipality[0]": ${ landlord.city }
    - "LProvince[0]": Ontario
    - "LPostalCode[0]": ${ landlord.postal_code }
    - "LDayPhone[0]": ${ landlord.phone if defined('landlord.phone') else '' }
    - "Lemail[0]": ${ landlord.email if defined('landlord.email') else '' }
    - "TFirstName1[0]": ${ tenant.name.first }
    - "TLastName1[0]": ${ tenant.name.last }
    - "TAddress[0]": ${ rental_unit.address }${ ', Unit ' + rental_unit.unit if rental_unit.unit else '' }
    - "TMunicipality[0]": ${ rental_unit.city }
    - "TProvince[0]": ${ rental_unit.province }
    - "TPostalCode[0]": ${ rental_unit.postal_code }
    - "StreetNumber[0]": ${ rental_unit.address.split(' ')[0] if ' ' in rental_unit.address else '' }
    - "StreetName[0]": ${ ' '.join(rental_unit.address.split(' ')[1:]) if ' ' in rental_unit.address else rental_unit.address }
    - "Unit[0]": ${ rental_unit.unit if defined('rental_unit.unit') and rental_unit.unit else '' }
    - "Municipality[0]": ${ rental_unit.city }
    - "PostalCode[0]": ${ rental_unit.postal_code }
    - "ArrearFrom1[0]": ${ n4_service_date }
    - "ArrearTo1[0]": ${ today() }
    - "RentCharge1[0]": ${ "%.2f" % total_arrears }
    - "RentPaid1[0]": ${ "%.2f" % partial_payment_amount if partial_payments else '0.00' }
    - "RentOwe1[0]": ${ "%.2f" % net_arrears }
    - "TotalRentOwe[0]": ${ "%.2f" % net_arrears }
    - "TotalOwe[0]": ${ "%.2f" % net_arrears }
    - "ApplicationFee[0]": "201.00"
    - "TotalAmountOwe[0]": ${ "%.2f" % (net_arrears + 201) }
    - "Reason1[0]": True
    - "CheckL1[0]": True
    - "SignName[0]": ${ landlord.name }
    - "ReprSignDate[0]": ${ today() }
---
mandatory: True
question: |
  ## Your L1 Application is Ready
subquestion: |
  **Next Steps:**

  1. Download and file with the LTB ($201 filing fee)
  2. Serve a copy on the tenant
  3. Attend the hearing �� bring your N4, proof of service, and rent ledger
  4. The tenant can void the L1 by paying all arrears + filing fee before
     the hearing

  ${ l1_attachment }

  ${ disclaimer_template }
buttons:
  - Start Another Form: restart
