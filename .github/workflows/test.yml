name: ALKiln Interview Tests

on:
  pull_request:
    paths:
      - 'docassemble-yourlegalaid/docassemble/yourlegalaid/data/questions/**.yml'
      - 'docassemble-yourlegalaid/docassemble/yourlegalaid/data/templates/**.docx'
  push:
    branches: [main]

jobs:
  alkiln:
    name: Run ALKiln tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Start Docassemble (Docker)
        run: |
          docker compose up -d
          # Wait for healthy
          for i in $(seq 1 30); do
            curl -sf http://localhost/health_check | grep -q "ok" && break
            sleep 10
          done

      - name: Install interview package
        run: |
          docker exec $(docker compose ps -q docassemble) \
            pip install -e /github/workspace/docassemble-yourlegalaid/

      - name: Run ALKiln tests
        run: |
          npx @alkiln/alkiln-core@latest \
            --base-url http://localhost \
            --output-dir test-results
        env:
          ALKILN_DOCASSEMBLE_URL: http://localhost
          ALKILN_USER_EMAIL: admin@admin.com
          ALKILN_USER_PASSWORD: ${{ secrets.DA_TEST_PASSWORD }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: alkiln-results
          path: test-results/
